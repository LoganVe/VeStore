<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeArchive</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

#search{
    width:100%;
    max-width:700px;
    display:block;
    margin:0 auto 25px;
    padding:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#151515;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:#151515;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#111;
    display:block;
}

.content{ padding:12px; }

.price{
    color:#00ff99;
    font-size:18px;
    font-weight:bold;
}

.title{
    margin-top:8px;
    font-size:14px;
}

.meta{
    color:#888;
    font-size:12px;
    margin-top:6px;
}

.button{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:10px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>VeArchive</h1>

<input id="search" placeholder="Search listings...">

<div id="listings">Loading...</div>

<script>

const container = document.getElementById("listings");

let all = [];

/* CLEAN IMAGE HANDLER */
function getImage(url){
    if(!url) return "";

    // force https only
    return url.replace("http://", "https://");
}

function render(data){

    container.innerHTML = `<div class="grid"></div>`;
    const grid = container.querySelector(".grid");

    data.forEach(item => {

        const img = getImage(item.pictureUrl);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img
                src="${img}"
                loading="lazy"
                alt=""
                onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300?text=No+Image';"
            >

            <div class="content">
                <div class="price">¥${item.price || 0}</div>
                <div class="title">${item.title || "Untitled"}</div>
                <div class="meta">${item.city || ""}</div>

                <a class="button" href="${item.url}" target="_blank">
                    View Listing
                </a>
            </div>
        `;

        grid.appendChild(card);
    });
}

async function load(){
    try{
        const res = await fetch("./data.json");
        const json = await res.json();

        all = json.items || json;
        render(all);

    } catch(e){
        console.log(e);
        container.innerHTML = "Failed to load data.json";
    }
}

/* search without re-breaking DOM too hard */
document.getElementById("search").addEventListener("input", (e) => {
    const t = e.target.value.toLowerCase();

    const filtered = all.filter(x =>
        (x.title || "").toLowerCase().includes(t)
    );

    render(filtered);
});

load();

</script>

</body>
</html>
