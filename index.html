<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VeArchive</title>

<style>
:root{
    --bg:#0b0b0b;
    --card:#111;
    --border:#222;
    --text:#f5f5f5;
    --muted:#888;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
}

header{
    padding:40px 25px;
    border-bottom:1px solid var(--border);
}

h1{ font-size:38px; }

.subtitle{
    color:var(--muted);
    margin-top:6px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

input, select{
    padding:10px;
    background:#111;
    border:1px solid #222;
    color:white;
    border-radius:8px;
}

#search{
    flex:1;
    min-width:220px;
}

.stats{
    margin-top:10px;
    color:var(--muted);
}

main{
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#000;
}

.content{
    padding:12px;
}

.price{
    font-size:18px;
    font-weight:bold;
}

.title{
    margin-top:6px;
    font-size:14px;
    line-height:1.4;
}

.city{
    margin-top:8px;
    color:var(--muted);
}

.button{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
}

.loading{
    text-align:center;
    padding:80px;
    color:var(--muted);
}
</style>
</head>

<body>

<header>
    <h1>VeArchive</h1>
    <div class="subtitle">Fashion Archive Marketplace</div>

    <div class="controls">
        <input id="search" placeholder="Search..." />
        <select id="cityFilter">
            <option value="">All Cities</option>
        </select>
        <select id="sort">
            <option value="">Sort</option>
            <option value="low">Price ↑</option>
            <option value="high">Price ↓</option>
        </select>
    </div>

    <div class="stats" id="stats">Loading...</div>
</header>

<main>
    <div id="listings" class="loading">Loading archive...</div>
</main>

<script>

let allItems = [];

const listings = document.getElementById("listings");
const stats = document.getElementById("stats");
const search = document.getElementById("search");
const cityFilter = document.getElementById("cityFilter");
const sort = document.getElementById("sort");

console.log("Site loaded:", window.location.href);

function fixImage(url){
    if(!url) return "";

    // force https
    url = url.replace("http://", "https://");

    // block unsupported formats
    if(url.toLowerCase().includes(".heic")){
        return "https://via.placeholder.com/400x500?text=Unsupported";
    }

    return url;
}

function populateCities(){
    const cities = [...new Set(allItems.map(i => i.city).filter(Boolean))].sort();

    cities.forEach(city => {
        const opt = document.createElement("option");
        opt.value = city;
        opt.textContent = city;
        cityFilter.appendChild(opt);
    });
}

function render(items){

    stats.textContent = `${items.length} listings`;

    if(!items.length){
        listings.innerHTML = `<div class="loading">No results found</div>`;
        return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img
                src="${fixImage(item.pictureUrl)}"
                loading="lazy"
                referrerpolicy="no-referrer"
                onerror="this.src='https://via.placeholder.com/400x500?text=Image+Unavailable'"
            >

            <div class="content">
                <div class="price">¥${Number(item.price || 0).toLocaleString()}</div>
                <div class="title">${item.title || "Untitled"}</div>
                <div class="city">${item.city || ""}</div>

                <a class="button" href="${item.url}" target="_blank">
                    View Listing
                </a>
            </div>
        `;

        grid.appendChild(card);
    });

    listings.innerHTML = "";
    listings.appendChild(grid);
}

function update(){

    let items = [...allItems];

    const q = search.value.toLowerCase().trim();

    if(q){
        items = items.filter(i =>
            (i.title || "").toLowerCase().includes(q)
        );
    }

    if(cityFilter.value){
        items = items.filter(i => i.city === cityFilter.value);
    }

    if(sort.value === "low"){
        items.sort((a,b) => (a.price||0)-(b.price||0));
    }

    if(sort.value === "high"){
        items.sort((a,b) => (b.price||0)-(a.price||0));
    }

    render(items);
}

async function load(){

    try{

        const res = await fetch("./data.json?cache=" + Date.now());

        if(!res.ok){
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        allItems = Array.isArray(data)
            ? data
            : (data.items || []);

        console.log("Loaded items:", allItems.length);

        populateCities();
        update();

    }catch(err){

        console.error("LOAD ERROR:", err);

        listings.innerHTML = `
            <div class="loading">
                Failed to load data.json<br>
                Check console (F12)
            </div>
        `;
    }
}

search.addEventListener("input", update);
cityFilter.addEventListener("change", update);
sort.addEventListener("change", update);

load();

</script>

</body>
</html>
