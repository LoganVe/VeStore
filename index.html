<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VeArchive</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}

.card{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  border:1px solid #2a2a2a;
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
  display:block;
  background:#000;
}

.content{
  padding:14px;
}

.title{
  font-size:14px;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  color:#00ff88;
  font-weight:bold;
  margin-bottom:8px;
}

.meta{
  color:#999;
  font-size:12px;
  margin-bottom:12px;
}

.button{
  display:inline-block;
  padding:8px 12px;
  background:#2a2a2a;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

.button:hover{
  background:#3a3a3a;
}

.loading{
  text-align:center;
  padding:50px;
  color:#888;
}
</style>
</head>

<body>

<h1>VeArchive</h1>

<div id="listings" class="grid">
  <div class="loading">Loading listings...</div>
</div>

<script>

const container = document.getElementById("listings");

async function loadListings(){

  try{

    const response = await fetch("./data.json");

    if(!response.ok){
      throw new Error("Failed to load data.json");
    }

    const data = await response.json();

    container.innerHTML = "";

    data.forEach(item => {

      const card = document.createElement("div");
      card.className = "card";

      let imageUrl = "";

      if(item.pictureUrl){

        const cleanUrl = item.pictureUrl
          .replace(/^https?:\/\//,'');

        imageUrl =
          "https://images.weserv.nl/?url=" +
          encodeURIComponent(cleanUrl);

      }

      card.innerHTML = `
        <img
          src="${imageUrl}"
          alt="${item.title || ''}"
          loading="lazy"
          onerror="this.src='https://placehold.co/600x800?text=No+Image';"
        >

        <div class="content">

          <div class="title">
            ${item.title || "Untitled"}
          </div>

          <div class="price">
            ¥${Number(item.price || 0).toLocaleString()}
          </div>

          <div class="meta">
            ${item.city || "Unknown"}<br>
            ${item.postedAt ? item.postedAt.slice(0,10) : ""}
          </div>

          <a
            class="button"
            href="${item.url || '#'}"
            target="_blank"
          >
            View Listing
          </a>

        </div>
      `;

      container.appendChild(card);

    });

  }catch(error){

    console.error(error);

    container.innerHTML = `
      <div class="loading">
        Failed to load data.json<br><br>
        Make sure:
        <br><br>
        1. data.json is in the same folder as index.html
        <br>
        2. You're using GitHub Pages, Vercel, Netlify, or Live Server
        <br>
        3. data.json contains valid JSON
      </div>
    `;

  }

}

loadListings();

</script>

</body>
</html>
