<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VeArchive</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.01);
    }

    img {
      max-width: 100%;
      border-radius: 8px;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>VeArchive</h1>
<div id="app"></div>

<script>
const app = document.getElementById("app");

/*
  IMPORTANT FIX:
  - ./data.json is required for GitHub Pages subpaths
  - cache: no-store prevents stale builds
*/
fetch("./data.json", { cache: "no-store" })
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP error " + res.status);
    }
    return res.json();
  })
  .then(data => {
    render(data);
  })
  .catch(err => {
    console.error(err);
    app.innerHTML = `
      <div class="error">
        ❌ Failed to load data.json<br><br>
        Make sure:
        <br>• data.json is in same folder as index.html
        <br>• GitHub Pages is deployed
        <br>• You can open /data.json directly in browser
      </div>
    `;
  });

function render(data) {
  app.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    // CLICK = go to detail page
    card.onclick = () => {
      window.location.href = `detail.html?id=${item.id}`;
    };

    card.innerHTML = `
      <h3>${item.city || "Unknown City"}</h3>
      <img src="${item.pictureUrl}" />

      <div class="seller">
        <img class="avatar" src="${item.seller?.avatarUrl || ''}" />
        <div>
          <strong>${item.seller?.name || "Unknown Seller"}</strong><br/>
          <small>${item.seller?.reviewsLabel || ""}</small>
        </div>
      </div>
    `;

    app.appendChild(card);
  });
}
</script>

</body>
</html>
