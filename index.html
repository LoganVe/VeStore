<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VeArchive</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.01);
      transition: 0.2s;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>VeArchive</h1>
<div id="app"></div>

<script>
const DATA_URL = "./data.json"; 
// IMPORTANT: works if data.json is in same folder as index.html in VeStore

fetch(DATA_URL)
  .then(res => {
    if (!res.ok) throw new Error("HTTP error " + res.status);
    return res.json();
  })
  .then(data => {
    const app = document.getElementById("app");
    app.innerHTML = "";

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      // FIX IMAGE (force https fallback)
      const imgUrl = item.pictureUrl?.replace("http://", "https://");

      card.innerHTML = `
        <h3>${item.title || "No title"}</h3>
        <p><strong>${item.city || ""}</strong></p>

        <img src="${imgUrl}" onerror="this.style.display='none'" />

        <div class="seller">
          <img class="avatar" src="${item.seller?.avatarUrl}" />
          <div>
            <strong>${item.seller?.name || ""}</strong><br/>
            <small>${item.seller?.reviewsLabel || ""}</small>
          </div>
        </div>
      `;

      // CLICK = open detail page
      card.onclick = () => {
        localStorage.setItem("selectedItem", JSON.stringify(item));
        window.location.href = "item.html";
      };

      app.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("app").innerHTML =
      `<div class="error">❌ Failed to load data.json</div>`;
    console.error(err);
  });
</script>

</body>
</html>
