<script>
  fetch('./data.json')
    .then(res => {
      if (!res.ok) throw new Error("data.json not found");
      return res.json();
    })
    .then(data => {
      const app = document.getElementById("app");

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${item.city}</h3>
          <img src="${item.pictureUrl}" />

          <div class="seller">
            <img class="avatar" src="${item.seller?.avatarUrl}" />
            <div>
              <strong>${item.seller?.name}</strong><br/>
              <small>${item.seller?.reviewsLabel}</small>
            </div>
          </div>

          <button onclick="contact('${item.seller?.refId}')">
            Contact Seller
          </button>
        `;

        // ✅ THIS IS WHAT YOU WERE MISSING
        card.onclick = () => {
          window.location.href = `item.html?id=${item.id}`;
        };

        app.appendChild(card);
      });
    })
    .catch(err => {
      console.error("ERROR:", err);
    });

function contact(refId) {
  alert("Contact seller ID: " + refId);
}
</script>
