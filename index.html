<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VeArchive</title>

<style>
body{
    margin:0;
    padding:24px;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

/* HEADER */
h1{
    text-align:center;
    margin-bottom:18px;
    letter-spacing:1px;
    font-weight:600;
}

/* SEARCH */
#search{
    width:100%;
    max-width:720px;
    display:block;
    margin:0 auto 20px;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid #222;
    background:#151515;
    color:white;
    outline:none;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:18px;
}

/* CARD (Grailed-ish) */
.card{
    background:#121212;
    border-radius:14px;
    overflow:hidden;
    transition:transform .2s ease, box-shadow .2s ease;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* IMAGE */
.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#000;
    opacity:0;
    transition:opacity .35s ease;
}

/* CONTENT */
.content{
    padding:12px 12px 14px;
}

.price{
    color:#00ff99;
    font-size:18px;
    font-weight:700;
}

.title{
    margin-top:6px;
    font-size:14px;
    line-height:1.3;
    color:#eaeaea;
}

.meta{
    color:#888;
    font-size:12px;
    margin-top:6px;
}

/* BUTTON */
.button{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:10px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-size:13px;
}

/* SKELETON LOADING */
.skeleton{
    animation:pulse 1.2s infinite ease-in-out;
    background:linear-gradient(90deg,#151515,#222,#151515);
    background-size:200% 100%;
}

.skel-img{
    height:320px;
    border-radius:14px 14px 0 0;
}

.skel-line{
    height:12px;
    margin:10px 12px;
    border-radius:6px;
}

@keyframes pulse{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
}

/* ERROR */
.error{
    color:#ff5555;
    text-align:center;
    padding:40px;
}

/* FADE IN */
.fade-in{
    opacity:1 !important;
}
</style>
</head>

<body>

<h1>VeArchive</h1>

<input id="search" type="text" placeholder="Search listings...">

<div id="listings"></div>

<script>

const listingsContainer = document.getElementById("listings");
let allListings = [];

/* ---------------- IMAGE ENGINE ---------------- */

function buildImageChain(url){
    if(!url) return "";

    const clean = url
        .replace("http://", "https://")
        .replace(".heic", ".jpg");

    // 1. primary proxy (reliable)
    const wsrv = "https://wsrv.nl/?url=" + encodeURIComponent(clean) + "&output=jpg";

    // 2. fallback proxy (backup)
    const imagesw = "https://images.weserv.nl/?url=" + encodeURIComponent(clean);

    // return chain (we try wsrv first, then fallback in onerror)
    return { clean, wsrv, imagesw };
}

/* ---------------- DATA LOAD ---------------- */

async function loadData(){
    try{
        const res = await fetch("data.json");
        if(!res.ok) throw new Error("data.json missing");

        const json = await res.json();

        allListings = Array.isArray(json) ? json : (json.items || []);

        render(allListings);

    } catch(err){
        console.error(err);
        listingsContainer.innerHTML = "<div style='color:red;text-align:center'>Failed to load</div>";
    }
}

/* ---------------- RENDER ---------------- */

function render(data){

    const grid = document.createElement("div");
    grid.className = "grid";

    data.forEach(item => {

        const imgData = buildImageChain(item.pictureUrl || item.image);

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.alt = item.title || "";

        // start with proxy 1
        img.src = imgData.wsrv;

        // STEP 1 failure → try second proxy
        img.onerror = () => {

            if(img.src === imgData.wsrv){
                img.src = imgData.imagesw;
                return;
            }

            // STEP 2 failure → final fallback
            img.src = "https://via.placeholder.com/400x300?text=No+Image";
        };

        const content = document.createElement("div");
        content.className = "content";

        content.innerHTML = `
            <div class="price">¥${item.price || 0}</div>
            <div class="title">${item.title || "Untitled"}</div>
            <div class="meta">${item.city || ""}</div>
            <a class="button" href="${item.url || '#'}" target="_blank">View Listing</a>
        `;

        card.appendChild(img);
        card.appendChild(content);
        grid.appendChild(card);
    });

    listingsContainer.innerHTML = "";
    listingsContainer.appendChild(grid);
}

/* ---------------- SEARCH ---------------- */

document.getElementById("search").addEventListener("input", e => {

    const term = e.target.value.toLowerCase();

    const filtered = allListings.filter(item =>
        (item.title || "").toLowerCase().includes(term)
    );

    render(filtered);
});

loadData();

</script>

</body>
</html>
