<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeArchive</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial,sans-serif;
}

header{
    padding:30px;
    border-bottom:1px solid #222;
}

h1{margin:0;font-size:36px;}

.controls{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input,select{
    padding:10px;
    background:#111;
    border:1px solid #222;
    color:white;
    border-radius:8px;
}

#search{flex:1;min-width:200px;}

.stats{margin-top:10px;color:#888;}

main{padding:20px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:15px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#000;
    display:block;
}

.content{padding:12px;}

.price{font-size:18px;font-weight:bold;}

.city{color:#888;font-size:13px;margin-top:5px;}

.button{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    background:#fff;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.loading{
    color:#777;
    text-align:center;
    padding:60px;
}
</style>
</head>

<body>

<header>
    <h1>VeArchive</h1>

    <div class="controls">
        <input id="search" placeholder="Search...">
        <select id="city"></select>
        <select id="sort">
            <option value="">Sort</option>
            <option value="low">Price ↑</option>
            <option value="high">Price ↓</option>
        </select>
    </div>

    <div class="stats" id="stats">Loading...</div>
</header>

<main>
    <div id="listings" class="loading">Loading...</div>
</main>

<script>

let items = [];

const listings = document.getElementById("listings");
const stats = document.getElementById("stats");
const search = document.getElementById("search");
const city = document.getElementById("city");
const sort = document.getElementById("sort");

/* ================= IMAGE ENGINE ================= */

function safeImage(url){
    if(!url) return fallback();
    if(url.includes(".heic")) return fallback();
    return url.replace("http://","https://");
}

function fallback(){
    return "https://via.placeholder.com/600x800?text=No+Image";
}

/* ================= RENDER ================= */

function render(data){

    stats.textContent = `${data.length} listings`;

    if(!data.length){
        listings.innerHTML = `<div class="loading">No results</div>`;
        return;
    }

    listings.innerHTML = `<div class="grid"></div>`;
    const grid = document.querySelector(".grid");

    data.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img 
                src="${safeImage(item.pictureUrl)}"
                loading="lazy"
                onerror="
                    if(!this.dataset.retry){
                        this.dataset.retry=1;
                        this.src='https://images.weserv.nl/?url=' + encodeURIComponent('${safeImage(item.pictureUrl)}'.replace('https://',''));
                    } else {
                        this.src='https://via.placeholder.com/600x800?text=No+Image';
                    }
                "
            >

            <div class="content">
                <div class="price">¥${(item.price||0).toLocaleString()}</div>
                <div>${item.title || 'Untitled'}</div>
                <div class="city">${item.city || ''}</div>

                <a class="button" href="${item.url}" target="_blank">
                    View
                </a>
            </div>
        `;

        grid.appendChild(card);
    });
}

/* ================= FILTER ================= */

function update(){

    let filtered = [...items];

    const q = search.value.toLowerCase();

    if(q){
        filtered = filtered.filter(i =>
            (i.title||'').toLowerCase().includes(q)
        );
    }

    if(city.value){
        filtered = filtered.filter(i => i.city === city.value);
    }

    if(sort.value === "low"){
        filtered.sort((a,b)=>a.price-b.price);
    }

    if(sort.value === "high"){
        filtered.sort((a,b)=>b.price-a.price);
    }

    render(filtered);
}

/* ================= CITIES ================= */

function loadCities(){

    const cities = [...new Set(items.map(i=>i.city).filter(Boolean))];

    city.innerHTML = `<option value="">All Cities</option>`;

    cities.forEach(c=>{
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        city.appendChild(opt);
    });
}

/* ================= LOAD JSON ================= */

async function load(){

    try{

        const res = await fetch("./data.json", {cache:"no-store"});

        if(!res.ok) throw new Error(res.status);

        const json = await res.json();

        items = json.items || [];

        loadCities();
        update();

    } catch(err){

        console.error(err);

        listings.innerHTML = `
            <div class="loading">
                Failed to load data.json
            </div>
        `;
    }
}

/* ================= EVENTS ================= */

search.addEventListener("input", update);
city.addEventListener("change", update);
sort.addEventListener("change", update);

load();

</script>

</body>
</html>
