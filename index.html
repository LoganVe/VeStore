<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VeArchive</title>

<style>
:root{
    --bg:#080808;
    --card:#111;
    --border:#222;
    --text:#f5f5f5;
    --muted:#888;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

header{
    padding:40px 25px;
    border-bottom:1px solid var(--border);
}

h1{font-size:40px;}

.subtitle{color:var(--muted);margin-top:6px;}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:25px;
}

input,select{
    background:#111;
    border:1px solid #222;
    color:white;
    padding:12px;
    border-radius:10px;
}

#search{flex:1;min-width:280px;}

.stats{margin-top:15px;color:var(--muted);}

main{padding:25px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
    background:#000;
}

.content{padding:16px;}

.price{font-size:22px;font-weight:700;}

.title{margin-top:10px;font-size:14px;}

.city{margin-top:12px;color:var(--muted);}

.button{
    display:block;
    margin-top:15px;
    text-align:center;
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
}

.loading{
    text-align:center;
    padding:100px;
    color:var(--muted);
}
</style>
</head>

<body>

<header>
<h1>VeArchive</h1>
<div class="subtitle">Fashion Archive Marketplace</div>

<div class="controls">
<input id="search" placeholder="Search...">
<select id="cityFilter"><option value="">All Cities</option></select>
<select id="sort">
<option value="">Sort</option>
<option value="low">Price ↑</option>
<option value="high">Price ↓</option>
</select>
</div>

<div class="stats" id="stats">Loading...</div>
</header>

<main>
<div id="listings" class="loading">Loading archive...</div>
</main>

<script>

let allItems = [];

const listings = document.getElementById("listings");
const stats = document.getElementById("stats");
const search = document.getElementById("search");
const cityFilter = document.getElementById("cityFilter");
const sort = document.getElementById("sort");

/* =========================
   GET BASE PATH (GITHUB SAFE)
========================= */
function getBasePath() {
    // Works on GitHub Pages + localhost
    const path = window.location.pathname;
    return path.substring(0, path.lastIndexOf("/") + 1);
}

/* =========================
   IMAGE FIX
========================= */
function image(url){
    if(!url) return "";
    return url.replace("http://","https://");
}

/* =========================
   CITY DROPDOWN
========================= */
function populateCities(){
    const cities = [...new Set(allItems.map(x => x.city).filter(Boolean))].sort();

    cityFilter.innerHTML = `<option value="">All Cities</option>`;

    cities.forEach(city=>{
        const option = document.createElement("option");
        option.value = city;
        option.textContent = city;
        cityFilter.appendChild(option);
    });
}

/* =========================
   RENDER
========================= */
function render(items){

    stats.textContent = `${items.length} listings`;

    if(!items.length){
        listings.innerHTML = `<div class="loading">No results found.</div>`;
        return;
    }

    listings.innerHTML = `<div class="grid"></div>`;
    const grid = listings.querySelector(".grid");

    items.forEach(item=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${image(item.pictureUrl)}"
                 loading="lazy"
                 onerror="this.src='https://via.placeholder.com/600x800?text=No+Image'">

            <div class="content">
                <div class="price">¥${Number(item.price || 0).toLocaleString()}</div>
                <div class="title">${item.title || "Untitled"}</div>
                <div class="city">${item.city || ""}</div>

                <a class="button" href="${item.url || '#'}" target="_blank">
                    View Listing
                </a>
            </div>
        `;

        grid.appendChild(card);
    });
}

/* =========================
   FILTER / SORT
========================= */
function update(){

    let items = [...allItems];

    const q = search.value.toLowerCase().trim();

    if(q){
        items = items.filter(item =>
            (item.title || "").toLowerCase().includes(q)
        );
    }

    if(cityFilter.value){
        items = items.filter(item =>
            item.city === cityFilter.value
        );
    }

    if(sort.value === "low"){
        items.sort((a,b)=>(a.price||0)-(b.price||0));
    }

    if(sort.value === "high"){
        items.sort((a,b)=>(b.price||0)-(a.price||0));
    }

    render(items);
}

/* =========================
   LOAD DATA.JSON (GITHUB SAFE)
========================= */
async function load(){

    try{

        const base = getBasePath();
        const url = base + "data.json";

        console.log("Loading:", url);

        const response = await fetch(url, {
            cache: "no-store"
        });

        if(!response.ok){
            throw new Error("HTTP " + response.status + " - " + url);
        }

        const data = await response.json();

        allItems =
            Array.isArray(data)
            ? data
            : (data.items || []);

        if(!Array.isArray(allItems)){
            throw new Error("Invalid JSON format");
        }

        populateCities();
        update();

    }catch(error){

        console.error("LOAD ERROR:", error);

        listings.innerHTML = `
            <div class="loading">
                Failed to load data.json<br><br>
                Check console (F12)
            </div>
        `;
    }
}

/* EVENTS */
search.addEventListener("input", update);
cityFilter.addEventListener("change", update);
sort.addEventListener("change", update);

load();

</script>

</body>
</html>
