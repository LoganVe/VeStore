<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VeArchive</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #app {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .card {
      background: white;
      padding: 15px;
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    img {
      max-width: 100%;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .loading {
      text-align: center;
      color: #555;
    }
  </style>
</head>

<body>

<h1>VeArchive</h1>
<div id="app" class="loading">Loading listings...</div>

<script>
  async function loadListings() {
    const app = document.getElementById("app");

    try {
      // ✅ GitHub Pages safe fetch
      const res = await fetch('data.json');

      if (!res.ok) {
        throw new Error("data.json not found");
      }

      const data = await res.json();

      app.innerHTML = "";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${item.city || 'Unknown City'}</h3>

          <img src="${item.pictureUrl}" />

          <div class="seller">
            <img class="avatar" src="${item.seller?.avatarUrl || ''}" />
            <div>
              <strong>${item.seller?.name || 'Unknown'}</strong><br/>
              <small>${item.seller?.reviewsLabel || ''}</small>
            </div>
          </div>

          <button onclick="contact(event, '${item.seller?.refId || ''}')">
            Contact Seller
          </button>
        `;

        // ✅ click card → open item page
        card.addEventListener("click", (e) => {
          if (e.target.tagName === "BUTTON") return;
          window.location.href = `item.html?id=${item.id}`;
        });

        app.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      app.innerHTML = `
        <div style="color:red;text-align:center;">
          ❌ Failed to load data.json<br><br>
          Fix checklist:<br>
          • data.json is in repo root<br>
          • GitHub Pages is deployed<br>
          • open /VeStore/data.json in browser
        </div>
      `;
    }
  }

  function contact(e, refId) {
    e.stopPropagation();
    alert("Contact seller ID: " + refId);
  }

  loadListings();
</script>

</body>
</html>
