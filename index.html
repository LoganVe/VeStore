<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VeArchive</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .error {
      text-align: center;
      color: red;
    }
  </style>
</head>

<body>

<h1>VeArchive</h1>
<div id="app"></div>

<script>
const app = document.getElementById("app");

// FIXED: only ONE fetch, with proper error handling
fetch("./data.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP error " + res.status);
    }
    return res.json();
  })
  .then(data => {
    render(data);
  })
  .catch(err => {
    console.error(err);
    app.innerHTML = `
      <div class="error">
        ❌ Failed to load data.json<br><br>
        Check:
        <br>• file is in same folder as index.html
        <br>• GitHub Pages is updated
        <br>• data.json opens directly in browser
      </div>
    `;
  });

function render(data) {
  app.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => {
      window.location.href = `detail.html?id=${item.id}`;
    };

    card.innerHTML = `
      <h3>${item.city || ""}</h3>
      <img src="${item.pictureUrl}" />

      <div class="seller">
        <img class="avatar" src="${item.seller?.avatarUrl || ''}" />
        <div>
          <strong>${item.seller?.name || ""}</strong><br/>
          <small>${item.seller?.reviewsLabel || ""}</small>
        </div>
      </div>
    `;

    app.appendChild(card);
  });
}
</script>

</body>
</html>
