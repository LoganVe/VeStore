<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VeArchive</title>

<style>
body{
    margin:0;
    padding:30px;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

#search{
    width:100%;
    max-width:700px;
    display:block;
    margin:0 auto 25px;
    padding:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#151515;
    color:white;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:#151515;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
    background:#000;
}

.content{
    padding:15px;
}

.price{
    color:#00ff99;
    font-size:22px;
    font-weight:bold;
}

.title{
    margin-top:10px;
    line-height:1.4;
}

.meta{
    color:#999;
    font-size:12px;
    margin-top:10px;
}

.button{
    display:block;
    text-align:center;
    margin-top:15px;
    padding:10px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:8px;
}

.error{
    color:red;
    text-align:center;
    padding:40px;
}

.loading{
    text-align:center;
    padding:40px;
}
</style>
</head>

<body>

<h1>VeArchive</h1>

<input
    type="text"
    id="search"
    placeholder="Search listings..."
>

<div id="listings">
    <div class="loading">Loading listings...</div>
</div>

<script>

const listingsContainer =
    document.getElementById("listings");

let allListings = [];

async function loadData(){

    try{

        const response =
            await fetch("data.json");

        if(!response.ok){
            throw new Error(
                "Could not find data.json"
            );
        }

        const json =
            await response.json();

        allListings =
            Array.isArray(json)
            ? json
            : (json.items || []);

        renderListings(allListings);

    }
    catch(error){

        console.error(error);

        listingsContainer.innerHTML = `
            <div class="error">
                Failed to load data.json<br><br>
                Open F12 → Console
            </div>
        `;
    }
}

function renderListings(data){

    if(!data.length){

        listingsContainer.innerHTML =
            `<div class="error">
                No listings found
            </div>`;

        return;
    }

    listingsContainer.innerHTML =
        '<div class="grid"></div>';

    const grid =
        document.querySelector(".grid");

    data.forEach(item=>{

        const image =
            item.pictureUrl ||
            item.image ||
            "";

        const card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `
            <img
  class="product-image"
  src="${image}"
  loading="lazy"
  referrerpolicy="no-referrer"
  alt="${item.title}"
 onerror="
  this.onerror = null;

  const fallback = 'https://wsrv.nl/?url=' + encodeURIComponent(this.src) + '&output=jpg';

  const img = new Image();

  img.onload = () => { this.src = fallback; };

  img.onerror = () => { this.style.display = 'none'; };

  img.src = fallback;
"
>
            <div class="content">

                <div class="price">
                    ¥${item.price || 0}
                </div>

                <div class="title">
                    ${item.title || "Untitled"}
                </div>

                <div class="meta">
                    ${item.city || ""}
                </div>

                <a
                    class="button"
                    href="${item.url || '#'}"
                    target="_blank"
                >
                    View Listing
                </a>

            </div>
        `;

        grid.appendChild(card);

    });
}

document
    .getElementById("search")
    .addEventListener("input",e=>{

        const term =
            e.target.value.toLowerCase();

        const filtered =
            allListings.filter(item=>
                (item.title || "")
                .toLowerCase()
                .includes(term)
            );

        renderListings(filtered);
    });

loadData();

</script>

</body>
</html>
