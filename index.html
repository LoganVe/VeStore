<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VeArchive</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:30px;
}

.hero{
  text-align:center;
  margin-bottom:40px;
}

.logo{
  font-size:56px;
  font-weight:800;
  letter-spacing:-2px;
}

.tagline{
  color:#888;
  margin-top:8px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:3px;
}

.search-container{
  max-width:700px;
  margin:30px auto;
}

#search{
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  background:#151515;
  color:white;
  font-size:15px;
}

#search:focus{
  outline:none;
  border-color:#555;
}

.store-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:#151515;
  border:1px solid #222;
  border-radius:18px;
  overflow:hidden;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.image-wrap{
  position:relative;
}

.product-image{
  width:100%;
  height:420px;
  object-fit:cover;
  background:#000;
}

.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:#fff;
  color:#000;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.content{
  padding:18px;
}

.price{
  font-size:28px;
  font-weight:700;
}

.cny{
  color:#777;
  font-size:13px;
  margin-top:4px;
}

.title{
  margin-top:14px;
  font-size:14px;
  line-height:1.5;
  height:66px;
  overflow:hidden;
}

.meta{
  margin-top:16px;
  color:#999;
  font-size:13px;
  line-height:1.7;
}

.button{
  display:block;
  width:100%;
  margin-top:18px;
  padding:12px;
  text-align:center;
  text-decoration:none;
  background:white;
  color:black;
  border-radius:10px;
  font-weight:700;
}

.loading{
  text-align:center;
  padding:60px;
  color:#888;
}

.no-results{
  text-align:center;
  color:#888;
  padding:50px;
}

@media(max-width:600px){

  body{
    padding:18px;
  }

  .logo{
    font-size:42px;
  }

  .product-image{
    height:340px;
  }

}

</style>
</head>

<body>

<header class="hero">

  <h1 class="logo">VeArchive</h1>

  <p class="tagline">
    Curated Archive Fashion From China
  </p>

</header>

<div class="search-container">
  <input
    id="search"
    type="text"
    placeholder="Search brands, items, sellers..."
  >
</div>

<div id="listings" class="store-grid">
  <div class="loading">Loading listings...</div>
</div>

<script>

<script>

const USD_RATE = 0.14;
let allListings = [];

function cnyToUsd(cny){
  return (Number(cny || 0) * USD_RATE).toFixed(2);
}

function getImage(item){

  let url =
    item.pictureUrl ||
    item.image ||
    item.picUrl ||
    item.images?.[0] ||
    "";

  if(!url){
    return "https://placehold.co/800x1000?text=No+Image";
  }

  return url;
}

function renderListings(data){

  const container =
    document.getElementById("listings");

  container.innerHTML = "";

  if(!data || data.length === 0){

    container.innerHTML =
      '<div class="no-results">No listings found.</div>';

    return;
  }

  data.forEach(item => {

    const card =
      document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <div class="image-wrap">

        ${
          item.freeShipping
          ? '<div class="badge">Free Shipping</div>'
          : ''
        }

        <img
          class="product-image"
          src="${getImage(item)}"
          alt="${item.title || ''}"
          loading="lazy"
          referrerpolicy="no-referrer"
          onerror="this.src='https://placehold.co/800x1000?text=No+Image'"
        >

      </div>

      <div class="content">

        <div class="price">
          $${cnyToUsd(item.price)}
        </div>

        <div class="cny">
          ¥${Number(item.price || 0).toLocaleString()} CNY
        </div>

        <div class="title">
          ${item.title || "Untitled"}
        </div>

        <div class="meta">
          ${item.city || "Unknown"}
          ${
            item.postedAt
            ? " • " + item.postedAt.slice(0,10)
            : ""
          }
        </div>

        <a
          class="button"
          href="${item.url || '#'}"
          target="_blank"
        >
          View Listing
        </a>

      </div>

    `;

    container.appendChild(card);

  });

}

async function loadListings(){

  try{

    const response =
      await fetch("./data.json");

    if(!response.ok){
      throw new Error("Could not load data.json");
    }

    const data =
      await response.json();

    allListings = Array.isArray(data)
      ? data
      : data.items || [];

    renderListings(allListings);

  }catch(error){

    console.error(error);

    document.getElementById("listings").innerHTML = `
      <div class="loading">
        Failed to load data.json
      </div>
    `;

  }

}

document
  .getElementById("search")
  .addEventListener("input", e => {

    const term =
      e.target.value.toLowerCase();

    const filtered =
      allListings.filter(item => {

        return (
          (item.title || "")
            .toLowerCase()
            .includes(term) ||

          (item.city || "")
            .toLowerCase()
            .includes(term)
        );

      });

    renderListings(filtered);

  });

loadListings();

</script>

</body>
</html>
