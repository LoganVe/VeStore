<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VeArchive</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.01);
    }

    img {
      max-width: 100%;
      border-radius: 8px;
    }

    .seller {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .avatar {
      width: 35px;
      height: 35px;
      border-radius: 50%;
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<h1>VeArchive</h1>
<div id="app"></div>

<script>
fetch("./data.json")
  .then(res => {
    console.log("STATUS:", res.status);
    if (!res.ok) throw new Error("data.json not found");
    return res.json();
  })
  .then(data => {
    console.log("LOADED DATA:", data);

    const app = document.getElementById("app");
    app.innerHTML = "";

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <h3>${item.title}</h3>
        <p><b>${item.city}</b> • ${item.price} ${item.currency}</p>
        <img src="${item.pictureUrl}" />

        <div class="seller">
          <img class="avatar" src="${item.seller.avatarUrl}" />
          <div>
            <strong>${item.seller.name}</strong><br/>
            <small>${item.seller.reviewsLabel}</small>
          </div>
        </div>
      `;

      card.onclick = () => window.location.href = item.url;

      app.appendChild(card);
    });
  })
  .catch(err => {
    console.error("FULL ERROR:", err);
    document.getElementById("app").innerHTML =
      "❌ Failed to load data.json";
  });
</script>

</body>
</html>
