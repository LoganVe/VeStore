<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeArchive</title>

<style>
body{
    margin:0;
    padding:24px;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

#search{
    width:100%;
    max-width:720px;
    display:block;
    margin:0 auto 20px;
    padding:12px;
    border-radius:12px;
    border:1px solid #222;
    background:#151515;
    color:white;
    outline:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:16px;
}

.card{
    background:#121212;
    border-radius:14px;
    overflow:hidden;
    transition:0.2s ease;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#000;
    display:block;
}

.content{
    padding:12px;
}

.price{
    color:#00ff99;
    font-size:18px;
    font-weight:700;
}

.title{
    font-size:14px;
    margin-top:6px;
    color:#eaeaea;
}

.meta{
    font-size:12px;
    color:#888;
    margin-top:6px;
}

.button{
    display:block;
    margin-top:12px;
    padding:10px;
    background:white;
    color:black;
    text-align:center;
    text-decoration:none;
    border-radius:10px;
    font-size:13px;
}

.error{
    text-align:center;
    color:red;
    padding:40px;
}
</style>
</head>

<body>

<h1>VeArchive</h1>

<input id="search" type="text" placeholder="Search listings...">

<div id="listings"></div>

<script>

const listingsContainer = document.getElementById("listings");

let allListings = [];

/* ---------------- IMAGE FIX SYSTEM ---------------- */

function getImageChain(url){
    if(!url) return null;

    const clean = url
        .replace("http://", "https://")
        .replace(".heic", ".jpg");

    return {
        primary: "https://wsrv.nl/?url=" + encodeURIComponent(clean) + "&output=jpg",
        backup: "https://images.weserv.nl/?url=" + encodeURIComponent(clean),
        raw: clean
    };
}

/* ---------------- LOAD DATA ---------------- */

async function loadData(){
    try{
        const res = await fetch("data.json");
        if(!res.ok) throw new Error("data.json not found");

        const json = await res.json();

        allListings = Array.isArray(json)
            ? json
            : (json.items || []);

        render(allListings);

    } catch(err){
        console.error(err);
        listingsContainer.innerHTML =
            "<div class='error'>Failed to load data.json</div>";
    }
}

/* ---------------- RENDER ---------------- */

function render(data){

    const grid = document.createElement("div");
    grid.className = "grid";

    data.forEach(item => {

        const imgData = getImageChain(item.pictureUrl || item.image);

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.alt = item.title || "";

        // START IMAGE
        if(imgData){
            img.src = imgData.primary;
        } else {
            img.src = "https://via.placeholder.com/400x300?text=No+Image";
        }

        // FALLBACK CHAIN
        img.onerror = () => {

            if(imgData && img.src === imgData.primary){
                img.src = imgData.backup;
                return;
            }

            img.src = "https://via.placeholder.com/400x300?text=No+Image";
        };

        const content = document.createElement("div");
        content.className = "content";

        content.innerHTML = `
            <div class="price">¥${item.price || 0}</div>
            <div class="title">${item.title || "Untitled"}</div>
            <div class="meta">${item.city || ""}</div>
            <a class="button" href="${item.url || "#"}" target="_blank">View Listing</a>
        `;

        card.appendChild(img);
        card.appendChild(content);
        grid.appendChild(card);
    });

    // IMPORTANT: full replace (fixes "not updating")
    listingsContainer.innerHTML = "";
    listingsContainer.appendChild(grid);
}

/* ---------------- SEARCH ---------------- */

document.getElementById("search").addEventListener("input", e => {

    const term = e.target.value.toLowerCase();

    const filtered = allListings.filter(item =>
        (item.title || "").toLowerCase().includes(term)
    );

    render(filtered);
});

/* ---------------- INIT ---------------- */

loadData();

</script>

</body>
</html>
