<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VeArchive</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    padding:30px;
    border-bottom:1px solid #222;
}

h1{margin:0;font-size:34px;}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

input,select{
    padding:10px;
    border-radius:8px;
    border:1px solid #333;
    background:#111;
    color:white;
}

main{padding:20px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    background:#000;
}

.content{padding:12px;}

.price{font-size:18px;font-weight:bold;}
.title{margin-top:8px;font-size:13px;line-height:1.4;color:#ddd;}
.city{margin-top:6px;color:#888;font-size:12px;}

.button{
    display:block;
    margin-top:10px;
    text-align:center;
    background:white;
    color:black;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.loading{
    padding:80px;
    text-align:center;
    color:#777;
}
</style>
</head>

<body>

<header>
<h1>VeArchive</h1>

<div class="controls">
<input id="search" placeholder="Search..." />
<select id="city"></select>
<select id="sort">
<option value="">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>
</div>

<div id="stats">Loading...</div>
</header>

<main>
<div id="listings" class="loading">Loading...</div>
</main>

<script>

let allItems = [];

const listings = document.getElementById("listings");
const search = document.getElementById("search");
const city = document.getElementById("city");
const sort = document.getElementById("sort");
const stats = document.getElementById("stats");

function fixImage(url){
    if(!url) return "";
    return url
        .replace("http://", "https://")
        .trim();
}

function fallbackImage(img){
    img.onerror = null;
    img.src = "https://via.placeholder.com/600x800?text=No+Image";
}

function buildCities(){
    const set = new Set(allItems.map(i => i.city).filter(Boolean));
    city.innerHTML = `<option value="">All Cities</option>`;
    [...set].sort().forEach(c=>{
        const o=document.createElement("option");
        o.value=c;
        o.textContent=c;
        city.appendChild(o);
    });
}

function render(items){

    stats.textContent = `${items.length} listings`;

    if(!items.length){
        listings.innerHTML = `<div class="loading">No results</div>`;
        return;
    }

    listings.innerHTML = `<div class="grid"></div>`;
    const grid = listings.querySelector(".grid");

    items.forEach(item=>{

        const card = document.createElement("div");
        card.className = "card";

        const imgUrl = fixImage(item.pictureUrl);

        card.innerHTML = `
            <img src="${imgUrl}"
                 loading="lazy"
                 referrerpolicy="no-referrer"
                 onerror="fallbackImage(this)">

            <div class="content">
                <div class="price">¥${(item.price||0).toLocaleString()}</div>
                <div class="title">${item.title || "Untitled"}</div>
                <div class="city">${item.city || ""}</div>

                <a class="button" href="${item.url}" target="_blank">
                    View
                </a>
            </div>
        `;

        grid.appendChild(card);
    });
}

function update(){

    let items = [...allItems];

    const q = search.value.toLowerCase().trim();

    if(q){
        items = items.filter(i =>
            (i.title||"").toLowerCase().includes(q)
        );
    }

    if(city.value){
        items = items.filter(i => i.city === city.value);
    }

    if(sort.value === "low"){
        items.sort((a,b)=>(a.price||0)-(b.price||0));
    }

    if(sort.value === "high"){
        items.sort((a,b)=>(b.price||0)-(a.price||0));
    }

    render(items);
}

async function load(){
    try{
        const res = await fetch("./data.json?cache=" + Date.now());
        const data = await res.json();

        allItems = data.items || [];

        buildCities();
        update();

    } catch(e){
        console.error(e);
        listings.innerHTML = "Failed to load data.json";
    }
}

search.addEventListener("input", update);
city.addEventListener("change", update);
sort.addEventListener("change", update);

load();

</script>

</body>
</html>
