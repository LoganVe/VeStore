<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Item View</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f7f7f7;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box" id="item"></div>

<script>
const item = JSON.parse(localStorage.getItem("selectedItem"));

if (!item) {
  document.getElementById("item").innerHTML = "No item selected.";
} else {
  const img = item.pictureUrl?.replace("http://", "https://");

  document.getElementById("item").innerHTML = `
    <h2>${item.title}</h2>
    <img src="${img}" />
    <p><strong>City:</strong> ${item.city}</p>
    <p><strong>Price:</strong> ${item.price} ${item.currency}</p>

    <button onclick="window.history.back()">← Back</button>
  `;
}
</script>

</body>
</html>
